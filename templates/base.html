<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>Job Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1><a href="/">Job Portal</a></h1>
            <nav>
                <a href="/">Home</a>
                <a href="/post-job">Post Job</a>
                <a href="/jobs">Job Listings</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
        <form action="/read-aloud" method="POST" id="tts-form">
            <input type="hidden" name="text" value="{{ content | safe }}">
            <button type="submit">Read Aloud</button>
        </form>
    </main>
    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 Job Portal</p>
            <div class="social-media">
                <a href="https://facebook.com" target="_blank">Facebook</a>
                <a href="https://twitter.com" target="_blank">Twitter</a>
                <a href="https://linkedin.com" target="_blank">LinkedIn</a>
            </div>
        </div>
    </footer>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
</body>
</html>
